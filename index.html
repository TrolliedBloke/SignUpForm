<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-Up Form</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- Side Bar Configuration -->

    <div class="side-bar">
      <div id="logo">
        <img src="./imgs/OdinLogo.png" alt="Odin Logo" />
        <h1>ODIN</h1>
      </div>
      <p class="credit">Photo by Halie West on Unsplash</p>
    </div>

    <!-- Form Section Configuration -->

    <div class="form-section">
      <div id="text-section">
        <p>
          This is not a real online service! You know you need something like
          this in your life to help you realize your deepest dreams. Sign up now
          to get started.
        </p>
        <p>You know you want to.</p>
      </div>

      <div id="sign-up-form">
        <h2>Let's do this!</h2>
        <div class="form-row">
          <div class="input-group">
            <label for="first_name">FIRST NAME</label>
            <input type="text" id="first_name" name="first_name" required />
          </div>
          <div class="input-group">
            <label for="last_name">LAST NAME</label>
            <input type="text" id="last_name" name="last_name" />
          </div>
        </div>
        <div class="form-row">
          <div class="input-group">
            <label for="email">EMAIL</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="input-group">
            <label for="phone_number">PHONE NUMBER</label>
            <input type="text" id="phone_number" name="phone_number" />
          </div>
        </div>
        <div class="form-row">
          <div class="input-group">
            <label for="password">PASSWORD</label>
            <input type="password" id="password" name="password" required />
          </div>
          <div class="input-group">
            <label for="confirm_password">CONFIRM PASSWORD</label>
            <input
              type="password"
              id="confirm_password"
              name="confirm_password"
              required
            />
          </div>
        </div>
      </div>

      <!-- form footer / submit button / login redirect -->
      <div class="form-footer">
        <button type="submit" id="submit_button">Create Account</button>
        <p>Already have an account? <a href="">Log In</a></p>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
